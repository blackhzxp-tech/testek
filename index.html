<!DOCTYPE html>
<html>
<head>
  <title>Black Hub - Key System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f14;
      color: #fff;
      font-family: 'Segoe UI', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      width: 480px;
    }
    h2 { font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 13px; margin-bottom: 24px; }
    #token-box {
      background: #0f0f14;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      padding: 16px;
      font-size: 22px;
      font-family: monospace;
      color: #f59e0b;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }
    #msg { color: #aaa; font-size: 13px; }
    #timer { color: #f87171; font-size: 12px; margin-top: 8px; }
    .copy-btn {
      margin-top: 16px;
      background: #f59e0b;
      color: #000;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }
    .copy-btn:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="box">
    <h2>⬛ Black Hub</h2>
    <p>Cole este token no jogo para gerar sua key!</p>
    <div id="token-box">Gerando...</div>
    <div id="msg">Aguarde...</div>
    <div id="timer"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyToken()">📋 Copiar Token</button>
  </div>

  <script>
    const tokenEl  = document.getElementById("token-box");
    const msgEl    = document.getElementById("msg");
    const timerEl  = document.getElementById("timer");
    const copyBtn  = document.getElementById("copyBtn");

    let generatedToken = "";
    let countdown = 600; // 10 minutos

    fetch("https://little-cell-5b16.farkzzin.workers.dev/token")
      .then(r => r.json())
      .then(data => {
        if (data.token) {
          generatedToken = data.token;
          tokenEl.textContent = data.token;
          msgEl.textContent = "✅ Cole este token no jogo!";
          copyBtn.style.display = "inline-block";

          // Countdown 10 min
          const interval = setInterval(() => {
            countdown--;
            const min = Math.floor(countdown / 60);
            const sec = countdown % 60;
            timerEl.textContent = `⏱ Expira em ${min}:${sec.toString().padStart(2,'0')}`;
            if (countdown <= 0) {
              clearInterval(interval);
              timerEl.textContent = "❌ Token expirado! Abra o link novamente.";
              timerEl.style.color = "#f87171";
              copyBtn.style.display = "none";
            }
          }, 1000);
        }
      })
      .catch(() => {
        tokenEl.textContent = "❌ Erro de conexão";
        tokenEl.style.color = "#f87171";
        msgEl.textContent = "Tente novamente.";
      });

    function copyToken() {
      navigator.clipboard.writeText(generatedToken);
      copyBtn.textContent = "✅ Copiado!";
      setTimeout(() => copyBtn.textContent = "📋 Copiar Token", 2000);
    }
  </script>
</body>
</html>
